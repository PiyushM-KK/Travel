<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+Devanagari:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:#0B141A;color:#0B2440;font-family:'Plus Jakarta Sans',sans-serif;-webkit-font-smoothing:antialiased}
  @keyframes wa-blink{0%,80%,100%{opacity:.3}40%{opacity:1}}
  @keyframes wa-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .wa-q:hover{background:#E8FCE4 !important}
  .wa-send:active{transform:scale(.92)}
  .wa-scroll::-webkit-scrollbar{width:6px}
  .wa-scroll::-webkit-scrollbar-thumb{background:rgba(0,0,0,.18);border-radius:6px}
</style>
</helmet>

<div ref="{{ root }}" style="height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#0B141A,#111B21)">
  <div style="width:100%;max-width:460px;height:100vh;max-height:920px;display:flex;flex-direction:column;background:#ECE5DD;box-shadow:0 30px 80px -20px rgba(0,0,0,.6);position:relative;overflow:hidden">

    <!-- top strip -->
    <div style="height:5px;background:#0B5C4E;flex-shrink:0"></div>

    <!-- header -->
    <div style="background:#075E54;color:#fff;display:flex;align-items:center;gap:11px;padding:8px 12px;flex-shrink:0">
      <a href="Home.dc.html" style="color:#fff;display:flex;align-items:center;text-decoration:none">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
      <div style="width:42px;height:42px;border-radius:50%;overflow:hidden;background:#fff;flex-shrink:0;border:1px solid rgba(255,255,255,.4)">
        <img src="images/skyline-wa.jpeg" alt="Skyline" style="width:100%;height:100%;object-fit:cover" />
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-size:15.5px;line-height:1.2">Skyline Travel Planner</div>
        <div style="font-size:12px;color:#cfeee6;line-height:1.2">{{ statusText }}</div>
      </div>
      <div style="display:flex;align-items:center;gap:20px;color:#fff;opacity:.95;padding-right:4px">
        <svg width="21" height="21" viewBox="0 0 24 24" fill="#fff"><path d="M17 10.5V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-3.5l4 3.5V7l-4 3.5z"/></svg>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M6.6 10.8a15 15 0 006.6 6.6l2.2-2.2a1 1 0 011-.24c1.1.37 2.3.57 3.5.57a1 1 0 011 1V20a1 1 0 01-1 1A17 17 0 013 4a1 1 0 011-1h3.5a1 1 0 011 1c0 1.2.2 2.4.57 3.5a1 1 0 01-.24 1L6.6 10.8z"/></svg>
        <svg width="6" height="22" viewBox="0 0 6 24" fill="#fff"><circle cx="3" cy="4" r="2"/><circle cx="3" cy="12" r="2"/><circle cx="3" cy="20" r="2"/></svg>
      </div>
    </div>

    <!-- messages -->
    <div ref="{{ scrollEl }}" class="wa-scroll" style="flex:1;overflow-y:auto;padding:16px 14px 8px;background-color:#ECE5DD;background-image:radial-gradient(rgba(120,140,130,.14) 1px,transparent 1px);background-size:22px 22px;display:flex;flex-direction:column;gap:7px">
      <!-- encryption notice -->
      <div style="align-self:center;background:#FCF4CB;color:#54656F;font-size:11.5px;text-align:center;padding:7px 12px;border-radius:8px;max-width:90%;margin-bottom:6px;line-height:1.45">
        <span data-en="🔒 This is an automated Skyline assistant. It can't confirm bookings, prices, availability or visas — our team follows up personally." data-hi="🔒 यह एक स्वचालित Skyline सहायक है। यह बुकिंग, मूल्य, उपलब्धता या वीज़ा की पुष्टि नहीं कर सकता — हमारी टीम व्यक्तिगत रूप से संपर्क करती है।">🔒 This is an automated Skyline assistant. It can't confirm bookings, prices, availability or visas — our team follows up personally.</span>
      </div>

      <sc-for list="{{ messages }}" as="m" hint-placeholder-count="1">
        <div style="align-self:{{ m.align }};max-width:80%;animation:wa-in .2s ease">
          <div style="position:relative;background:{{ m.bg }};color:#111B21;font-size:14px;line-height:1.45;padding:7px 9px 5px 11px;border-radius:{{ m.radius }};box-shadow:0 1px 1px rgba(0,0,0,.13);white-space:pre-wrap;word-wrap:break-word">{{ m.text }}<span style="float:right;margin:6px 0 -2px 10px;font-size:10.5px;color:#667781;display:inline-flex;align-items:center;gap:3px">{{ m.time }}{{ m.tick }}</span></div>
        </div>
      </sc-for>

      <sc-if value="{{ thinking }}" hint-placeholder-val="{{ false }}">
        <div style="align-self:flex-start;background:#fff;border-radius:9px 9px 9px 2px;padding:11px 14px;box-shadow:0 1px 1px rgba(0,0,0,.13);display:flex;gap:4px">
          <span style="width:7px;height:7px;border-radius:50%;background:#9AAEB3;animation:wa-blink 1.2s infinite"></span>
          <span style="width:7px;height:7px;border-radius:50%;background:#9AAEB3;animation:wa-blink 1.2s infinite .2s"></span>
          <span style="width:7px;height:7px;border-radius:50%;background:#9AAEB3;animation:wa-blink 1.2s infinite .4s"></span>
        </div>
      </sc-if>
    </div>

    <!-- quick replies -->
    <div style="display:flex;gap:8px;padding:8px 12px 2px;background:#ECE5DD;flex-wrap:wrap;flex-shrink:0">
      <sc-for list="{{ chips }}" as="c" hint-placeholder-count="3">
        <button class="wa-q" onClick="{{ c.send }}" style="border:1px solid #C9D6CE;background:#F2FBEF;cursor:pointer;font-family:inherit;font-weight:600;font-size:12px;color:#1F7A53;padding:7px 13px;border-radius:999px">{{ c.label }}</button>
      </sc-for>
    </div>

    <!-- input -->
    <form onSubmit="{{ onSubmit }}" style="display:flex;align-items:center;gap:8px;padding:8px 10px 10px;background:#ECE5DD;flex-shrink:0">
      <div style="flex:1;display:flex;align-items:center;gap:8px;background:#fff;border-radius:24px;padding:9px 14px;box-shadow:0 1px 1px rgba(0,0,0,.08)">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="#54656F"><circle cx="12" cy="12" r="9" fill="none" stroke="#8696A0" stroke-width="1.6"/><circle cx="9" cy="10" r="1.2"/><circle cx="15" cy="10" r="1.2"/><path d="M8.5 14.5a4 4 0 007 0" fill="none" stroke="#8696A0" stroke-width="1.6" stroke-linecap="round"/></svg>
        <input ref="{{ inputEl }}" placeholder="Message" style="flex:1;border:0;outline:none;font-family:inherit;font-size:14.5px;color:#111B21;background:transparent" />
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#8696A0"><path d="M16.5 6.5l-7 7a2.1 2.1 0 003 3l7-7a4.2 4.2 0 00-6-6l-7 7a6.3 6.3 0 009 9l6-6" fill="none" stroke="#8696A0" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <button class="wa-send" type="submit" style="flex-shrink:0;width:46px;height:46px;border:0;cursor:pointer;background:#00A884;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 5px rgba(0,0,0,.2);transition:transform .12s">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="#fff"><path d="M3 11l18-8-8 18-2-7-8-3z"/></svg>
      </button>
    </form>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { thinking: false, messages: [] };

  setRoot = (el) => { this.rootEl = el; };
  setScroll = (el) => { this.scrollEl = el; };
  setInput = (el) => { this.inputEl = el; };

  now() {
    const d = new Date();
    let h = d.getHours(); const m = d.getMinutes();
    const ap = h >= 12 ? 'pm' : 'am'; h = h % 12 || 12;
    return h + ':' + (m < 10 ? '0' + m : m) + ' ' + ap;
  }

  componentDidMount() {
    const greet = { role: 'assistant', text: "Namaste! 🙏 You're chatting with Skyline Travel Planner. Tell me where you'd like to go, your travel dates, number of travellers and budget — I'll suggest ideas and our team will follow up with an itinerary & quote. ✈️🏝️", time: this.now() };
    let seed = '';
    try { seed = new URL(window.location.href).searchParams.get('msg') || ''; } catch (e) {}
    this.setState({ messages: [greet] }, () => {
      this.scrollDown();
      if (seed) setTimeout(() => this.ask(seed), 400);
    });
  }

  scrollDown() { if (this.scrollEl) this.scrollEl.scrollTop = this.scrollEl.scrollHeight; }
  componentDidUpdate() { this.scrollDown(); }

  primer() {
    return `You are the official WhatsApp chat assistant for "Skyline Travel Planner", an India-based travel planning service (WhatsApp +91 8866050291, info@skylinetravelplanner.com). Help travellers with: choosing destinations (Rajasthan, Himachal, Kashmir, Kerala, Goa, Sikkim, Mysuru/Coorg/Ooty, Mathura/Vrindavan/Agra, Gujarat, Uttar Pradesh; internationally Thailand, Bali, Maldives), trip duration, draft itineraries, 3/4/5-star hotel comparison, budget and season guidance, family/honeymoon/religious/group planning, and FAQs. Prices are in Indian Rupees and ALWAYS "starting from" estimates — never guaranteed. Write like a warm, professional WhatsApp agent: short messages, friendly, a few tasteful emojis, line breaks over long paragraphs (under 90 words). After understanding the trip, tell them our travel team will share a detailed itinerary & quotation, and invite them to also fill the "Customize My Trip" form on our website. NEVER claim to confirm tickets, process payments, guarantee hotel availability, guarantee prices, guarantee visa approval, or give official immigration advice — politely say our team / the official provider handles that. Never ask for card, bank, Aadhaar or passport details.`;
  }

  async ask(text) {
    if (!text || this.state.thinking) return;
    const msgs = [...this.state.messages, { role: 'user', text, time: this.now(), sent: true }];
    this.setState({ messages: msgs, thinking: true });
    try {
      const api = [
        { role: 'user', content: this.primer() },
        { role: 'assistant', content: 'Understood — I will reply as the Skyline Travel Planner WhatsApp assistant within those limits.' },
        ...msgs.map((m) => ({ role: m.role === 'assistant' ? 'assistant' : 'user', content: m.text })),
      ];
      const reply = await window.claude.complete({ messages: api });
      this.setState({ messages: [...msgs, { role: 'assistant', text: (reply || '').trim() || 'Sorry, could you say that again?', time: this.now() }], thinking: false });
    } catch (e) {
      this.setState({ messages: [...msgs, { role: 'assistant', text: "I'm having a connection issue right now. Please call or message us directly at +91 8866050291 and our team will help you. 🙏", time: this.now() }], thinking: false });
    }
  }

  onSubmit = (e) => {
    e.preventDefault();
    const v = this.inputEl ? this.inputEl.value.trim() : '';
    if (this.inputEl) this.inputEl.value = '';
    this.ask(v);
  };

  renderVals() {
    const blueTick = React.createElement('svg', { width: 15, height: 11, viewBox: '0 0 18 12', fill: 'none', style: { marginBottom: '-1px' } },
      React.createElement('path', { d: 'M1 6.5l3.2 3.2L10 3.5', stroke: '#53BDEB', strokeWidth: 1.6, strokeLinecap: 'round', strokeLinejoin: 'round' }),
      React.createElement('path', { d: 'M6.5 9.7L12.5 3.5', stroke: '#53BDEB', strokeWidth: 1.6, strokeLinecap: 'round', strokeLinejoin: 'round' }));
    return {
      root: this.setRoot,
      scrollEl: this.setScroll,
      inputEl: this.setInput,
      onSubmit: this.onSubmit,
      thinking: this.state.thinking,
      statusText: this.state.thinking ? 'typing…' : 'online',
      messages: this.state.messages.map((m) => {
        const me = m.role === 'user';
        return {
          text: m.text,
          align: me ? 'flex-end' : 'flex-start',
          bg: me ? '#D9FDD3' : '#FFFFFF',
          radius: me ? '9px 2px 9px 9px' : '2px 9px 9px 9px',
          time: m.time || '',
          tick: me ? blueTick : '',
        };
      }),
      chips: [
        { label: 'Kerala family trip', send: () => this.ask('I want a Kerala family trip for 4 people, 6 days, around ₹30,000 per person.') },
        { label: 'Honeymoon ideas', send: () => this.ask('Suggest a honeymoon destination for a week within ₹60,000 per person.') },
        { label: 'Rajasthan package', send: () => this.ask('Can you suggest a Rajasthan package and how many days I need?') },
        { label: 'Best time for Kashmir', send: () => this.ask('What is the best time to visit Kashmir?') },
      ],
    };
  }
}
</script>
</body>
</html>
