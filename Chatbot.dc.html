<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://unpkg.com" crossorigin>
<link rel="dns-prefetch" href="https://unpkg.com">
<link rel="icon" type="image/png" href="images/logo.png">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Skyline AI Travel Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+Devanagari:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box }
    html, body { height: 100% }
    body { margin: 0; background: #eef4fb; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased }
    @keyframes sk-in { from { opacity: 0; transform: translateY(8px) } to { opacity: 1; transform: none } }
    @keyframes sk-blink { 0%,80%,100% { opacity: .3 } 40% { opacity: 1 } }
    .sk-q:hover { background: #e6f0fb !important; border-color: #0a5fd7 !important }
    .sk-send:active { transform: scale(.92) }
    .sk-scroll::-webkit-scrollbar { width: 7px }
    .sk-scroll::-webkit-scrollbar-thumb { background: rgba(10,95,215,.22); border-radius: 7px }
  </style>
</helmet>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <rect width="120" height="120" fill="#0A5FD7"/>
    <path d="M60 30l3.2 8.8L72 42l-8.8 3.2L60 54l-3.2-8.8L48 42l8.8-3.2L60 30z" fill="#fff"/>
    <circle cx="80" cy="76" r="4" fill="#fff"/><circle cx="42" cy="72" r="3" fill="#fff"/>
  </svg>
</template>

<div ref="{{ root }}" style="height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px">
  <div style="width: 100%; max-width: 620px; height: 100%; max-height: 860px; display: flex; flex-direction: column; background: #fff; border-radius: 22px; overflow: hidden; box-shadow: 0 30px 70px -24px rgba(10,60,120,.4)">

    <!-- header -->
    <div style="background: linear-gradient(135deg, #0a5fd7, #34a0f0); color: #fff; padding: 18px 22px; display: flex; align-items: center; gap: 14px; flex-shrink: 0">
      <a href="index.html" style="color: #fff; display: flex; align-items: center; margin-right: 2px">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
      <span style="width: 44px; height: 44px; border-radius: 14px; background: rgba(255,255,255,.2); display: flex; align-items: center; justify-content: center; flex-shrink: 0">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="#fff"><path d="M12 3l1.6 4.4L18 9l-4.4 1.6L12 15l-1.6-4.4L6 9l4.4-1.6L12 3z"/><circle cx="18.5" cy="17.5" r="1.6"/><circle cx="5.5" cy="16.5" r="1.2"/></svg>
      </span>
      <div style="flex: 1; min-width: 0">
        <div style="font-weight: 800; font-size: 17px; letter-spacing: -.01em">Skyline AI Travel Assistant</div>
        <div style="font-size: 12.5px; opacity: .9; display: flex; align-items: center; gap: 6px"><span style="width: 8px; height: 8px; border-radius: 50%; background: #7cf2b0"></span>{{ statusText }}</div>
      </div>
    </div>

    <!-- messages -->
    <div ref="{{ scrollEl }}" class="sk-scroll" style="flex: 1; overflow-y: auto; padding: 22px; background: #f6faff; display: flex; flex-direction: column; gap: 14px">
      <sc-for list="{{ messages }}" as="m" hint-placeholder-count="1">
        <div style="display: flex; justify-content: {{ m.justify }}; animation: sk-in .22s ease">
          <div style="max-width: 82%; padding: 12px 15px; border-radius: {{ m.radius }}; font-size: 14.5px; line-height: 1.55; background: {{ m.bg }}; color: {{ m.color }}; white-space: pre-wrap; word-wrap: break-word; box-shadow: 0 2px 10px -5px rgba(10,60,120,.25)">{{ m.text }}</div>
        </div>
      </sc-for>
      <sc-if value="{{ thinking }}" hint-placeholder-val="{{ false }}">
        <div style="display: flex; justify-content: flex-start">
          <div style="padding: 14px 17px; border-radius: 16px 16px 16px 4px; background: #fff; display: flex; gap: 5px; box-shadow: 0 2px 10px -5px rgba(10,60,120,.25)">
            <span style="width: 8px; height: 8px; border-radius: 50%; background: #9ab8dc; animation: sk-blink 1.2s infinite"></span>
            <span style="width: 8px; height: 8px; border-radius: 50%; background: #9ab8dc; animation: sk-blink 1.2s infinite .2s"></span>
            <span style="width: 8px; height: 8px; border-radius: 50%; background: #9ab8dc; animation: sk-blink 1.2s infinite .4s"></span>
          </div>
        </div>
      </sc-if>
    </div>

    <!-- quick chips -->
    <div style="display: flex; gap: 8px; padding: 12px 16px 0; flex-wrap: wrap; background: #fff; flex-shrink: 0">
      <sc-for list="{{ chips }}" as="c" hint-placeholder-count="4">
        <button class="sk-q" onClick="{{ c.send }}" style="border: 1px solid #dce7f4; background: #fff; cursor: pointer; font-family: inherit; font-weight: 600; font-size: 12.5px; color: #2c4a68; padding: 8px 14px; border-radius: 999px; transition: all .15s">{{ c.label }}</button>
      </sc-for>
    </div>

    <!-- input -->
    <form onSubmit="{{ onSubmit }}" style="display: flex; gap: 10px; padding: 14px 16px; background: #fff; border-top: 1px solid #eef3f9; flex-shrink: 0">
      <input ref="{{ inputEl }}" placeholder="Ask about destinations, hotels, budget, best season…" style="flex: 1; border: 1.5px solid #dce7f4; border-radius: 13px; padding: 13px 15px; font-family: inherit; font-size: 14.5px; outline: none; color: #1b2f40" />
      <button class="sk-send" type="submit" style="flex-shrink: 0; width: 50px; border: 0; cursor: pointer; background: #0a5fd7; color: #fff; border-radius: 13px; display: flex; align-items: center; justify-content: center; transition: transform .12s">
        <svg width="21" height="21" viewBox="0 0 24 24" fill="#fff"><path d="M3 11l18-8-8 18-2-7-8-3z"/></svg>
      </button>
    </form>
    <div style="font-size: 11px; color: #9ab8dc; text-align: center; padding: 0 16px 12px; background: #fff; flex-shrink: 0">Skyline AI gives guidance only — it can't confirm bookings, prices, availability or visas. Our team follows up personally.</div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {
    thinking: false,
    messages: [{ role: 'assistant', text: "Namaste! 🙏 I'm the Skyline AI Travel Assistant. Tell me where you'd like to go, your dates, travellers and budget — I'll suggest destinations, trip length and hotel categories, then point you to a quote on WhatsApp or our Customize My Trip form. ✈️🏝️" }],
  };

  setRoot = (el) => { this.rootEl = el; };
  setScroll = (el) => { this.scrollEl = el; };
  setInput = (el) => { this.inputEl = el; };

  componentDidMount() {
    this.scrollDown();
    if (this.inputEl) this.inputEl.focus();
  }
  scrollDown() { if (this.scrollEl) this.scrollEl.scrollTop = this.scrollEl.scrollHeight; }
  componentDidUpdate() { this.scrollDown(); }

  primer() {
    return `You are the Skyline AI Travel Assistant for "Skyline Travel Planner", an India-based travel-planning website (WhatsApp +91 8866050291, info@skylinetravelplanner.com). Help with: destination selection, trip duration, preliminary itineraries, hotel-category comparison (3/4/5-star), packing lists, transport recommendations, family & honeymoon planning, budget planning, travel-season guidance, and FAQs. Focus destinations: Rajasthan, Himachal, Kashmir, Kerala, Goa, Sikkim, Mysuru/Coorg/Ooty, Mathura/Vrindavan/Agra, Gujarat, Uttar Pradesh, and internationally Thailand, Bali, Maldives. Prices are in Indian Rupees and always "starting from" estimates, never guaranteed. Reply in the same language the user writes in (English, Hindi or Gujarati). Keep replies warm, concise (under 120 words), practical, with a few tasteful emojis. After understanding the trip, encourage the user to request a customized package (the website form) or chat on WhatsApp for a quote. NEVER claim to confirm tickets, process payments, guarantee hotel availability, guarantee prices, guarantee visa approval, or give official immigration advice — politely defer those. Never ask for card, bank, Aadhaar or passport details.`;
  }

  async ask(text) {
    if (!text || this.state.thinking) return;
    const msgs = [...this.state.messages, { role: 'user', text }];
    this.setState({ messages: msgs, thinking: true });
    try {
      const api = [
        { role: 'user', content: this.primer() },
        { role: 'assistant', content: 'Understood — I will help plan trips with Skyline Travel Planner within those limits.' },
        ...msgs.map((m) => ({ role: m.role === 'assistant' ? 'assistant' : 'user', content: m.text })),
      ];
      const reply = await window.claude.complete({ messages: api });
      this.setState({ messages: [...msgs, { role: 'assistant', text: (reply || '').trim() || "Sorry, I didn't catch that — could you rephrase?" }], thinking: false });
    } catch (e) {
      this.setState({ messages: [...msgs, { role: 'assistant', text: "I'm having trouble connecting right now. For quick help, message us on WhatsApp at +91 8866050291 or use the Customize My Trip form. 🙏" }], thinking: false });
    }
  }

  onSubmit = (e) => {
    e.preventDefault();
    const v = this.inputEl ? this.inputEl.value.trim() : '';
    if (this.inputEl) this.inputEl.value = '';
    this.ask(v);
  };

  renderVals() {
    return {
      root: this.setRoot,
      scrollEl: this.setScroll,
      inputEl: this.setInput,
      onSubmit: this.onSubmit,
      thinking: this.state.thinking,
      statusText: this.state.thinking ? 'typing…' : 'Online · here to help plan your trip',
      messages: this.state.messages.map((m) => {
        const me = m.role === 'user';
        return {
          text: m.text,
          justify: me ? 'flex-end' : 'flex-start',
          bg: me ? '#0a5fd7' : '#fff',
          color: me ? '#fff' : '#1b2f40',
          radius: me ? '16px 16px 4px 16px' : '16px 16px 16px 4px',
        };
      }),
      chips: [
        { label: '5-day Kerala trip', send: () => this.ask('Can you suggest a 5-day Kerala itinerary for a family of 4?') },
        { label: '3★ vs 5★ packages', send: () => this.ask("What's the difference between a 3-star and 5-star package?") },
        { label: 'Best time for Kashmir', send: () => this.ask('What is the best time to visit Kashmir?') },
      ],
    };
  }
}
</script>
</body>
</html>
